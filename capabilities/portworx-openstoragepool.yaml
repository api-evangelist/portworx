  - type: http
    namespace: portworx-openstoragepool
    baseUri: ''
    description: OpenStorage SDK — OpenStoragePool business capability. Self-contained, no shared references.
    resources:
    - name: v1-storagepools-rebalance
      path: /v1/storagepools/rebalance
      operations:
      - name: openstoragepoolrebalance
        method: PUT
        description: Rebalance creates a new rebalance task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-storagepools-rebalance-job
      path: /v1/storagepools/rebalance/job
      operations:
      - name: openstoragepoolenumeraterebalancejobs
        method: GET
        description: EnumerateRebalanceJobs returns all rebalance jobs currently known to the system
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-storagepools-rebalance-job-id
      path: /v1/storagepools/rebalance/job/{id}
      operations:
      - name: openstoragepoolgetrebalancejobstatus
        method: GET
        description: GetRebalanceJobStatus returns rebalance status for specified job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the rebalance job
          required: true
      - name: openstoragepoolupdaterebalancejobstate
        method: PUT
        description: UpdateRebalanceJobState updates existing rebalance task state.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: ID of the rebalance job
          required: true
    - name: v1-storagepools-rebalance-schedule
      path: /v1/storagepools/rebalance/schedule
      operations:
      - name: openstoragepooldeleterebalanceschedule
        method: DELETE
        description: DeleteRebalanceSchedule deletes the rebalance schedule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: openstoragepoolgetrebalanceschedule
        method: GET
        description: GetRebalanceSchedule returns the information of rebalance schedule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: openstoragepoolcreaterebalanceschedule
        method: POST
        description: CreateRebalanceSchedule creates a scheudle for the input rebalance requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
