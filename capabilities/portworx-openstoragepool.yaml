      operations:
      - name: openstoragepoolresize
        method: PUT
        description: Resize expands the specified storage pool based on the request parameters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uuid
          in: path
          type: string
          description: UUID of the storage pool to inspect
          required: true
    authentication:
      type: bearer
      token: '{{env.PORTWORX_API_KEY}}'
  exposes:
